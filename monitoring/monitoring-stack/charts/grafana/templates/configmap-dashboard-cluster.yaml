apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-dashboard-cluster
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  cluster-node-dashboard.json: |
    {
      "title": "Cluster & Node Dashboard",
      "uid": "enterprise-devops-cluster-node",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Nodes Up",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "count(up{job=\"node-exporter\"} == 1)", "legendFormat": "nodes up" }]
        },
        {
          "id": 2,
          "title": "Total Pods (Cluster)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "count(kube_pod_info)", "legendFormat": "pods" }]
        },
        {
          "id": 3,
          "title": "Node CPU Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [{
            "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
            "legendFormat": "{{`{{instance}}`}}"
          }]
        },
        {
          "id": 4,
          "title": "Node Memory Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [{
            "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
            "legendFormat": "{{`{{instance}}`}}"
          }]
        },
        {
          "id": 5,
          "title": "Node Disk Usage % (root filesystem)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "targets": [{
            "expr": "100 * (1 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"}))",
            "legendFormat": "{{`{{instance}}`}}"
          }]
        },
        {
          "id": 6,
          "title": "Node Network I/O (bytes/sec)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "targets": [
            { "expr": "rate(node_network_receive_bytes_total{device!=\"lo\"}[5m])", "legendFormat": "{{`{{instance}} rx {{device}}`}}" },
            { "expr": "rate(node_network_transmit_bytes_total{device!=\"lo\"}[5m])", "legendFormat": "{{`{{instance}} tx {{device}}`}}" }
          ]
        }
      ]
    }
