apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-dashboard-namespace
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  namespace-pod-dashboard.json: |
    {
      "title": "Namespace & Pod Dashboard",
      "uid": "enterprise-devops-namespace-pod",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Pods per Namespace",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "targets": [{ "expr": "count by (namespace) (kube_pod_info)", "legendFormat": "{{`{{namespace}}`}}" }]
        },
        {
          "id": 2,
          "title": "Deployment Availability (available / desired replicas)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 0 },
          "targets": [{
            "expr": "kube_deployment_status_replicas_available / kube_deployment_spec_replicas",
            "legendFormat": "{{`{{namespace}}`}}/{{`{{deployment}}`}}"
          }]
        },
        {
          "id": 3,
          "title": "Pod Restarts (rate, 15m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"enterprise-devops\"}[15m])",
            "legendFormat": "{{`{{pod}}`}}/{{`{{container}}`}}"
          }]
        },
        {
          "id": 4,
          "title": "Pods Not Running",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [{
            "expr": "kube_pod_status_phase{namespace=\"enterprise-devops\", phase!=\"Running\", phase!=\"Succeeded\"} == 1",
            "legendFormat": "{{`{{pod}}`}} - {{`{{phase}}`}}"
          }]
        },
        {
          "id": 5,
          "title": "Per-Pod CPU Usage (cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "targets": [{
            "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"enterprise-devops\", container!=\"\", container!=\"POD\"}[5m]))",
            "legendFormat": "{{`{{pod}}`}}"
          }]
        },
        {
          "id": 6,
          "title": "Per-Pod Memory Usage (bytes)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "targets": [{
            "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"enterprise-devops\", container!=\"\", container!=\"POD\"})",
            "legendFormat": "{{`{{pod}}`}}"
          }]
        }
      ]
    }
