apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alertmanager.fullname" . }}-config
  labels:
    {{- include "alertmanager.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      {{- if .Values.slack.enabled }}
      routes:
        - receiver: slack
          matchers:
            - severity =~ "warning|critical"
      {{- end }}

    receivers:
      # No-op by default - alerts are visible in the Alertmanager UI
      # (http://localhost:9093 via port-forward) even with zero external
      # integrations configured. This is deliberate: the chart should
      # install and alerts should fire and be observable without forcing
      # every learner to have a Slack workspace on hand first.
      - name: default

      {{- if .Values.slack.enabled }}
      - name: slack
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url
            channel: {{ .Values.slack.channel | quote }}
            send_resolved: true
            title: "{{`{{ .CommonAnnotations.summary }}`}}"
            text: "{{`{{ .CommonAnnotations.description }}`}}"
      {{- end }}

    inhibit_rules:
      # A crash-looping pod usually also trips CPU/memory alerts as it
      # restarts - suppress the noisier resource alerts while the more
      # actionable crash-loop alert is already firing for the same pod.
      - source_matchers: ["alertname = PodCrashLooping"]
        target_matchers: ["alertname =~ HighCPUUsage|HighMemoryUsage"]
        equal: ["namespace", "pod"]
