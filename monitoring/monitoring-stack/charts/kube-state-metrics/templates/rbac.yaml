apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-state-metrics.fullname" . }}
  labels:
    {{- include "kube-state-metrics.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-state-metrics.fullname" . }}
  labels:
    {{- include "kube-state-metrics.labels" . | nindent 4 }}
rules:
  # Read-only across exactly the object kinds this project's dashboards
  # and alert rules actually use (pod status/restarts, deployment/
  # replicaset/statefulset/daemonset replica counts, node conditions, HPA
  # status) - not the full upstream kube-state-metrics RBAC surface,
  # which also covers CRDs and resources this repo doesn't otherwise use.
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "services", "persistentvolumeclaims", "resourcequotas", "replicationcontrollers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-state-metrics.fullname" . }}
  labels:
    {{- include "kube-state-metrics.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-state-metrics.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "kube-state-metrics.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
