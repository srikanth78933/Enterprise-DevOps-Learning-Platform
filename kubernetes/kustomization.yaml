# The Jenkins "Deploy to EKS" stage (see scripts/deploy-to-eks.sh) does two things:
#   1. kubectl apply -k kubernetes/          - baseline apply, uses `images:` below
#   2. kubectl set image deployment/backend backend=<image>:<build-tag> -n enterprise-devops
#      kubectl set image deployment/frontend frontend=<image>:<build-tag> -n enterprise-devops
#
# Step 2 bumps to this specific build's tag without needing the standalone
# kustomize CLI - `kubectl apply -k` already understands this file natively.
#
# secret.example.yaml is intentionally NOT listed here - real secrets are
# applied separately (see secret.example.yaml header) so they never need to
# pass through a file kustomize reads from disk in CI.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: enterprise-devops

resources:
  - namespace.yaml
  - configmap.yaml
  - mysql-deployment.yaml
  - backend-deployment.yaml
  - backend-hpa.yaml
  - frontend-deployment.yaml
  - ingress.yaml

images:
  - name: yourdockerhubuser/enterprise-devops-backend
    newTag: latest
  - name: yourdockerhubuser/enterprise-devops-frontend
    newTag: latest
