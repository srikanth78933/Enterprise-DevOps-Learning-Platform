apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: enterprise-devops
data:
  SPRING_PROFILES_ACTIVE: "prod"
  DB_URL: "jdbc:mysql://mysql:3306/enterprise_devops?useSSL=false&allowPublicKeyRetrieval=true"
  # This branch doesn't deploy a frontend - set this to whatever origin
  # actually calls the API (e.g. a frontend running elsewhere, or your
  # local dev frontend's origin), not the internal service DNS name, since
  # CORS checks the browser's origin, not where the request is proxied from.
  CORS_ALLOWED_ORIGINS: "http://enterprise-devops.example.com"
  SERVER_PORT: "8080"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: enterprise-devops
data:
  MYSQL_DATABASE: "enterprise_devops"
