# Template only - never commit a real secret.yaml with actual values.
#
# Generate the real one locally and apply it directly without ever writing
# it to disk in the repo:
#
#   kubectl create secret generic backend-secret \
#     --namespace enterprise-devops \
#     --from-literal=DB_USERNAME=devops_user \
#     --from-literal=DB_PASSWORD='<strong-password>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl create secret generic mysql-secret \
#     --namespace enterprise-devops \
#     --from-literal=MYSQL_USER=devops_user \
#     --from-literal=MYSQL_PASSWORD='<strong-password>' \
#     --from-literal=MYSQL_ROOT_PASSWORD='<strong-root-password>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# In Jenkins, these same values come from Jenkins Credentials, never from a
# file in git - see docs/05-Flow.md for how the Deploy stage injects them.

apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: enterprise-devops
type: Opaque
stringData:
  DB_USERNAME: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: enterprise-devops
type: Opaque
stringData:
  MYSQL_USER: "REPLACE_ME"
  MYSQL_PASSWORD: "REPLACE_ME"
  MYSQL_ROOT_PASSWORD: "REPLACE_ME"
