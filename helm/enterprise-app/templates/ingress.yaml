{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    {{- include "enterprise-app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    # global.ingressHost is empty by default - omitting `host:` entirely
    # matches any Host header, so the raw Load Balancer hostname works
    # directly in a browser with zero client-side setup (no hosts-file
    # entry, no DNS). Set global.ingressHost (see values-prod.yaml.example)
    # once you have a real domain pointed at the Load Balancer, to route
    # only that hostname instead.
    - {{- if .Values.global.ingressHost }}
      host: {{ .Values.global.ingressHost | quote }}
      {{- end }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "backend.fullname" . }}
                port:
                  number: {{ .Values.backend.service.port | default 8080 }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "frontend.fullname" . }}
                port:
                  number: {{ .Values.frontend.service.port | default 80 }}
{{- end }}
