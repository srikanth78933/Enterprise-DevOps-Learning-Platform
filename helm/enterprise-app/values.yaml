# Umbrella values - keys matching a subchart's name (frontend/backend/mysql)
# override that subchart's own values.yaml at the same path. `global` is a
# Helm-special key merged into every subchart's .Values.global automatically.

# Empty by default: the Ingress then matches any Host header, so the raw
# Load Balancer hostname works directly in a browser with zero client-side
# setup. Set this once you have a real domain pointed at the Load Balancer
# (see values-prod.yaml.example) to restrict routing to just that host.
global:
  ingressHost: ""

ingress:
  enabled: true
  className: nginx
  annotations: {}

frontend:
  replicaCount: 2
  image:
    repository: devopstraining064/enterprise-devops-frontend
    tag: latest

backend:
  replicaCount: 2
  image:
    repository: devopstraining064/enterprise-devops-backend
    tag: latest
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6

mysql:
  persistence:
    enabled: true
    size: 10Gi
