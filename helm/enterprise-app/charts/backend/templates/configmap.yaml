apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}-config
  labels:
    {{- include "backend.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.config.springProfilesActive | quote }}
  DB_URL: {{ .Values.config.dbUrl | quote }}
  {{- /* The Ingress no longer pins to one hostname (matches any Host
         header - see templates/ingress.yaml), and the frontend calls the
         API via a relative path anyway so it's always same-origin and
         never actually needs CORS. This only matters for a caller on a
         different origin (a separate tool, another frontend, etc.), so
         a wildcard is fine here rather than tracking a hostname that no
         longer exists as a single fixed value. */}}
  CORS_ALLOWED_ORIGINS: "*"
  SERVER_PORT: {{ .Values.service.port | quote }}
