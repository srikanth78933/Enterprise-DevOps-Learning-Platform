apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}-config
  labels:
    {{- include "backend.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.config.springProfilesActive | quote }}
  DB_URL: {{ .Values.config.dbUrl | quote }}
  {{- /* global.ingressHost (set once at the umbrella chart level) wins so
         the frontend's actual public hostname and this CORS allow-list
         can never drift apart; falls back to the per-chart default when
         this chart is installed standalone, outside the umbrella. */}}
  CORS_ALLOWED_ORIGINS: {{ printf "http://%s" (.Values.global.ingressHost | default "enterprise-devops.example.com") | quote }}
  SERVER_PORT: {{ .Values.service.port | quote }}
  SLOW_REQUEST_THRESHOLD_MS: {{ .Values.config.slowRequestThresholdMs | quote }}
