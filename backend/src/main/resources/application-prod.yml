spring:
  jpa:
    show-sql: false
    hibernate:
      # No migration tool (Flyway/Liquibase) exists in this project yet, so
      # "validate" has nothing to validate against on a fresh database and
      # the app never starts. Using "update" until a real migration tool is
      # introduced - revisit this once one is.
      ddl-auto: update

logging:
  level:
    root: WARN
    com.enterprise.devops: INFO
