# Minimal overrides for installing Argo CD itself via the official Helm
# chart (argo/argo-cd). See scripts/argocd-install.sh for the install
# command that uses this file.
#
# These are learning-environment shortcuts, not production settings - see
# the comments below.

configs:
  params:
    # Auto-generates a self-signed cert instead of requiring a real one up
    # front. `argocd login --insecure` skips verifying it - that's what
    # "insecure" means here, not "no TLS at all" (the API is still served
    # over HTTPS on port 443).
    server.insecure: true

server:
  service:
    # LoadBalancer, not ClusterIP: this project's whole point is that
    # Jenkins has zero kubectl/cluster credentials (see
    # architecture/README.md), so it has no way to `kubectl port-forward`
    # to a ClusterIP service to reach the Argo CD API - it needs a real,
    # directly-reachable network endpoint. Costs a second small Load
    # Balancer alongside ingress-nginx's, which is the tradeoff for
    # Jenkins genuinely having no cluster access rather than just
    # pretending to (a ClusterIP-only setup would force Jenkins to keep
    # some form of kubectl access just to reach this one endpoint,
    # defeating the actual point of this project).
    type: LoadBalancer
    annotations:
      # Without this, the AWS Load Balancer Controller defaults to an
      # internal-scheme NLB even when public ELB-tagged subnets exist -
      # unreachable from Jenkins (which lives outside the cluster VPC).
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

controller:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
